<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Robin – Gaming Profil</title>
  <meta name="description" content="Persönliche Profilseite von Robin im dunklen Modus" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0b0f17;         /* Hintergrund */
      --card: #111827;       /* Karten-Hintergrund */
      --text: #e5e7eb;       /* Primärtext */
      --muted: #9ca3af;      /* Sekundärtext */
      --accent: #60a5fa;     /* Akzentfarbe */
      --accent-2: #a78bfa;   /* zweite Akzentfarbe */
      --ring: rgba(96,165,250,.6);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: radial-gradient(1200px 800px at 10% -10%, rgba(96,165,250,.12), transparent 50%),
                  radial-gradient(800px 600px at 110% 10%, rgba(167,139,250,.12), transparent 40%),
                  var(--bg);
      line-height: 1.6;
    }

    .wrap {
      min-height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 820px;
      background: linear-gradient(180deg, rgba(17,24,39,.92), rgba(17,24,39,.86));
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .header {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 20px;
      padding: 28px 28px 8px 28px;
      align-items: center;
    }

    /* Bild-Platzhalter (ersetzen, siehe Kommentar unten) */
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 16px;
      background: linear-gradient(135deg, rgba(96,165,250,.25), rgba(167,139,250,.25));
      border: 1px dashed rgba(255,255,255,.25);
      display: grid; place-items: center;
      color: var(--muted);
      text-align: center;
      padding: 10px;
      user-select: none;
    }

    .title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px 16px;
    }

    h1 {
      margin: 0; font-size: 32px; letter-spacing: .2px;
    }
    .tag {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 14px; color: var(--muted);
    }
    .tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 3px rgba(96,165,250,.15); }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 12px 28px 24px 28px;
    }

    .meta .item {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 14px;
      padding: 12px 14px;
    }

    .label { display:block; font-size:12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
    .value { font-size: 16px; margin-top: 4px; }

    .games {
      padding: 0 28px 28px 28px;
      display: flex; flex-wrap: wrap; gap: 10px;
    }

    .badge {
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 999px;
      font-size: 14px;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
      will-change: transform;
    }
    .badge:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,.35); border-color: rgba(96,165,250,.35); }

    .footer {
      padding: 16px 28px 28px 28px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    .btn {
      appearance: none; border: 0; cursor: pointer;
      background: linear-gradient(180deg, var(--accent), var(--accent-2));
      color: #0b0f17; font-weight: 700;
      padding: 10px 14px; border-radius: 12px;
      box-shadow: 0 8px 24px rgba(96,165,250,.35);
      transition: transform .15s ease, filter .15s ease;
    }
    .btn:hover { transform: translateY(-1px); filter: brightness(1.06); }

    .hint { font-size: 13px; color: var(--muted); }

    /* Kleinere Displays */
    @media (max-width: 520px) {
      .header { grid-template-columns: 1fr; }
      .avatar { width: 100%; height: 180px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <article class="card" aria-label="Profilkarte von Robin">
      <header class="header">
        <!--
          BILD EINFÜGEN:
          1) Lade eine Datei (z. B. images/robin.jpg) in dein GitHub-Repo hoch.
          2) Ersetze das folgende <div class="avatar">…</div> durch die kommentierte <img>-Zeile.

          Beispiel:
          <img src="images/robin.jpg" alt="Foto von Robin" width="120" height="120" style="border-radius:16px; display:block; object-fit:cover; aspect-ratio:1/1;" />
        -->
        <div class="avatar">Bild hier einfügen</div>

        <div>
          <div class="title">
            <h1>Robin</h1>
            <span class="tag" aria-label="Status"><span class="dot" aria-hidden="true"></span> Gamer-Profil</span>
          </div>
          <p class="hint">Dunkler Modus • Einfache Ein-Datei-Website</p>
        </div>
      </header>

      <section class="meta" aria-label="Basisinfos">
        <div class="item">
          <span class="label">Alter</span>
          <span class="value">17</span>
        </div>
        <div class="item">
          <span class="label">Wohnort</span>
          <span class="value">deutschladfn</span> <!-- Tipp: hier in "Deutschland" ändern, falls gewünscht -->
        </div>
      </section>

      <section class="games" aria-label="Spiele, die Robin spielt">
        <span class="badge" aria-label="Counter-Strike 2">Counter‑Strike 2</span>
        <span class="badge" aria-label="Valorant">Valorant</span>
        <span class="badge" aria-label="Roblox">Roblox</span>
        <span class="badge" aria-label="Minecraft">Minecraft</span>
        <span class="badge" aria-label="Fortnite">Fortnite</span>
      </section>

      <footer class="footer">
        <button class="btn" onclick="navigator.clipboard.writeText(location.href).catch(()=>{})">Link kopieren</button>
        <span class="hint">Bearbeite Name/Alter/Wohnort direkt im HTML.</span>
      </footer>
    </article>
  </main>
</body>
</html>
